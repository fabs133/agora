schema_version: 1
name: axis-1-tool-call-fidelity
description: "Axis-1 tool-call fidelity sweep: 1 probe x 6 models x 2 arms x 3 repeats. Ordered to minimize\
  \ model swaps. qwen-coder-32b is omitted (VRAM gate). v1: arm.scaffolding/strictness are recorded but\
  \ not yet behavioural, so lean and rich produce identical runs \u2014 the sweep is repeatability data."
defaults:
  params:
    temperature: 0.0
    seed: 42
    num_ctx: 8192
    max_tokens: 2048
  output_dir: runs_out/axis-1-tool-call-fidelity
  resume: true
  review_timeout_seconds: 5
runs:
