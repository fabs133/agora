- {id: r004, probe: flows/tool-call-fidelity.plan.yaml, profile: qwen-coder-7b,
   arm: {scaffolding: lean, strictness: strict}, repeat: 1, strategy: qwen2_5_coder}
- {id: r005, probe: flows/tool-call-fidelity.plan.yaml, profile: qwen-coder-7b,
