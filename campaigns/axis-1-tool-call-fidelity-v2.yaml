# axis-1 v2 — per-model prompting strategies, A/B against same-daemon controls.
#
# STATUS: DRAFT. This file intentionally fails load_campaign() until Phase 3
# lands (CampaignRun gains `strategy: str | None = None`; pydantic
# extra='forbid' rejects it before then — loud failure is the contract).
#
# Design (see docs/plans/axis-1-v2.md):
#   * A/B dimension is the per-run `strategy` field, NOT the arm. arm stays
#     lean/strict uniformly and remains reserved for its original purpose.
#   * Control runs (strategy: null) precede treatment runs within each model
#     block — preserves v1-like sequencing given qwen3's suspected
#     loaded-state carryover across consecutive runs.
#   * gemma4:e4b and qwen2.5:7b-instruct run null/null: drift sentinels.
#     gemma was byte-deterministic on daemon 0.24; any v1<->v2 divergence in
#     its cells IS the daemon delta (0.24 -> 0.31.1), quantified.
#   * qwen3:30b runs 5+5 (both null pending Phase 2): bistability
#     characterization with the prewarm num_ctx fix in place.
#   * Treatment strategy names are Phase-2 placeholders; Phase 2 may revise
#     them but every change must update docs/research/prompting-strategies.md
#     first (pre-registration before execution).
#
# Comparisons this design supports:
#   within-v2  control vs treatment  -> strategy effect, same daemon (primary)
#   v1 vs v2   control cells only    -> daemon drift 0.24 -> 0.31.1
#   v1 vs v2   steady-state only     -> block-first prewarm contamination is
#                                       fixed in v2; never compare block-first.
schema_version: 1
name: axis-1-tool-call-fidelity-v2
description: "Axis-1 v2: per-model prompting strategies vs same-daemon controls.\
  \ 1 probe x 6 models, 40 runs. Coder 7b/14b + mistral-nemo carry Phase-2\
  \ strategies; gemma + qwen-instruct are drift sentinels; qwen3 runs 5+5 for\
  \ bistability. Params identical to v1 (temp=0, seed=42, num_ctx=8192).\
  \ Daemon: track-latest policy; version captured per run in run.jsonl."
defaults:
  params:
    temperature: 0.0
    seed: 42
    num_ctx: 8192
    max_tokens: 2048
  output_dir: runs_out/axis-1-tool-call-fidelity-v2
  resume: true
  review_timeout_seconds: 5
runs:
# --- qwen2.5-coder:7b --------------------------------------------- 6 runs
- {id: r001, probe: flows/tool-call-fidelity.plan.yaml, profile: qwen-coder-7b,
   arm: {scaffolding: lean, strictness: strict}, repeat: 1, strategy: null}
- {id: r002, probe: flows/tool-call-fidelity.plan.yaml, profile: qwen-coder-7b,
   arm: {scaffolding: lean, strictness: strict}, repeat: 2, strategy: null}
- {id: r003, probe: flows/tool-call-fidelity.plan.yaml, profile: qwen-coder-7b,
