name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Agora with all optional extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,litellm,llm]"

      - name: pytest with coverage gate
        env:
          # E2E suites need a live Conduit + Ollama; skip in CI.
          AGORA_E2E: "0"
          AGORA_MATRIX_LIVE: "0"
        run: |
          pytest \
            --cov=agora \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            --timeout=90 \
            -q

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
