name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      # ruff format is intentionally NOT enforced yet — the codebase has
      # organic style and a sweeping reformat is a separate decision.
      # Track via the open follow-up; flip to `ruff format --check .` once
      # a one-shot reformat commit lands.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure git identity for repo-creating tests
        # tests/git/test_merge.py runs `git merge --no-ff` against fresh
        # tmp_path repos. The committer Actor is set explicitly in
        # src/agora/git/merge.py, but a global identity is also expected
        # by some git versions on a host with no user.* config.
        run: |
          git config --global user.name "Agora CI"
          git config --global user.email "ci@agora.local"
          git config --global init.defaultBranch main

      - name: Install Agora with all optional extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,litellm,llm]"

      - name: pytest with coverage gate
        env:
          # E2E suites need a live Conduit + Ollama; skip in CI.
          AGORA_E2E: "0"
          AGORA_MATRIX_LIVE: "0"
        run: |
          pytest \
            --cov=agora \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            --timeout=90 \
            -q

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
