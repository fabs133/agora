ngthAdjust="spacing" textLength="134.9702" x="288" y="159.1919">non-empty output &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="47.2583" x="427.1025" y="159.1919">unless</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.8677" x="478.4932" y="159.1919">post-hide</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.0151" x="288" y="174.3247">manifest has zero mutation tools (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="26.9712" x="512.0151" y="174.3247">F13</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="538.9863" y="174.3247">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.4409" x="288" y="189.4575">every delta logged (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="140.8799" x="419.4409" y="189.4575">manifest-delta rule</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="560.3208" y="189.4575">)</text><g class="message" data-entity-1="part2" data-entity-2="part7" id="msg2"><polygon fill="#181818" points="1162.3579,219.6563,1172.3579,223.6563,1162.3579,227.6563,1166.3579,223.6563" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="277.019" x2="1168.3579" y1="223.6563" y2="223.6563"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.3008" x="652.5381" y="218.5903">manifest deltas (INFO)</text></g><g class="message" data-entity-1="part1" data-entity-2="part3" id="msg3"><polygon fill="#181818" points="369.249,248.7891,379.249,252.7891,369.249,256.7891,373.249,252.7891" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="77.2715" x2="375.249" y1="252.7891" y2="252.7891"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.8984" x="138.311" y="247.7231">messages + system + tools</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg4"><polygon fill="#181818" points="654.9629,277.9219,664.9629,281.9219,654.9629,285.9219,658.9629,281.9219" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="381.249" x2="660.9629" y1="281.9219" y2="281.9219"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="57.04" x="495.5859" y="276.856">/api/chat</text></g><path d="M386,294.9219 L386,379.9219 L673,379.9219 L673,304.9219 L663,294.9219 L386,294.9219" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M663,294.9219 L663,304.9219 L673,304.9219 L663,294.9219" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.3691" x="392" y="311.9888">tool results delivered verbatim,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.0112" x="392" y="327.1216">one message per result, no markers,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.2563" x="392" y="342.2544">no re-encoding (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="40.4346" x="499.2563" y="342.2544">v5-v7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.5615" x="539.6909" y="342.2544">: byte-transparent</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.3994" x="392" y="357.3872">observation channe