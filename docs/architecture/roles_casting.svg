fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="121.459" x="274.54" y="23.3"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.665" x="284.54" y="46.2951">profiles.yaml</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="101.459" x="284.54" y="62.592">model identity</text></g><!--entity MATRIX--><g class="entity" data-qualified-name="MATRIX" data-source-line="10" id="ent0005"><rect fill="#F1F1F1" height="85.1875" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="197.96" x="431.29" y="7"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.1592" x="441.29" y="29.9951">capability matrix</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.9434" x="441.29" y="46.292">evidence rows keyed</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="177.96" x="441.29" y="62.5889">(model x probe_version x</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.2324" x="441.29" y="78.8857">harness x tool-surface)</text></g><!--entity MANIFEST--><g class="entity" data-qualified-name="MANIFEST" data-source-line="11" id="ent0006"><rect fill="#F1F1F1" height="52.5938" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="210.9414" x="663.8" y="23.3"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.5439" x="673.8" y="46.2951">local manifest store</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9414" x="673.8" y="62.592">model sizes (bytes on disk)</text></g><!--entity VAL--><g class="entity" data-qualified-name="VAL" data-source-line="13" id="ent0007"><rect fill="#F1F1F1" height="36.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="112.2715" x="474.13" y="178.74"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.2715" x="484.13" y="201.7351">validate_cast</text></g><!--entity LOAD--><g class="entity" data-qualified-name="LOAD" data-source-line="14" id="ent0008"><rect fill="#F1F1F1" height="36.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="181.5469" x="249.49" y="348.1"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.5469" x="259.49" y="371.0951">load_cast -&gt; seat table</text></g><!--entity SEATS--><g class="entity" data-qualified-name="SEATS" data-source-line="15" id="ent0009"><rect fill="#F1F1F1" height="68.8906" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="173.9385" x="253.3" y="507.92"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.6074" x="263.3" y="530.9151">Orchestrator seats</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.9385" x="263.3" y="547.212">implementer / tester /</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="143.7871" x="263.3" y="563.5089">verifier / planner / ...</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="26" id="ent0018"><path d="M465.72,285.59 L465.72,446.9181 A0,0 0 0 0 465.72,446.9181 L746.8089,446.9181 A0,0 0 0 0 746.8089,446.9181 L746.8089,295.59 L736.8089,285.59 L573.95,285.59 L538.26,215.48 L565.95,285.59 L465.72,285.59 A0,0 0 0 0 465.72,285.59" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M736.8089,285.59 L736.8089,295.59 L746.8089,295.59 L736.8089,285.59" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.2368" x="471.72" y="302.6569">four rules, all loud:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.7993" x="471.72" y="317.7897">1. every profile reference resolves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.0889" x="471.72" y="332.9225">2. sum(resident sizes) &lt;= vram_budget</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.0767" x="484.117" y="348.0553">(sizes from disk, never hand-entered)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.2158" x="471.72" y="363.1881">3. evidence at compatible keys OR an</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.5347" x="484.117" y="378.321">explicit waiver &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="26.9712" x="599.784" y="378.321">F12</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="58.5952" x="626.7552" y="378.321">: the tool</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.6563" x="484.117" y="393.4538">surface a seat exposes is part of</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.7568" x="484.117" y="408.5866">the evidence key</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.4136" x="471.72" y="423.7194">4. binding: human is always valid</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.3755" x="484.117" y="438.8522">(planner precedent; no pretending)</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="39" id="ent0021"><path d="M6,169.19 L6,224.5884 A0,0 0 0 0 6,224.5884 L274.5332,224.5884 A0,0 0 0 0 274.5332,224.5884 L274.5332,179.19 L264.5332,169.19 L144.27,169.19 L140.27,92.62 L136.27,169.19 L6,169.19 A0,0 0 0 0 6,169.19" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M264.5332,169.19 L264.5332,179.19 L274.5332,179.19 L264.5332,169.19" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.0972" x="12" y="186.2569">one cast file per hardware envelope;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.5332" x="12" y="201.3897">changing GPUs = choosing a different</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.5347" x="12" y="216.5225">cast, roles.yaml untouched</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="45" id="ent0024"><path d="M215.88,637.81 L215.88,723.4741 A0,0 0 0 0 215.88,723.4741 L464.6593,723.4741 A0,0 0 0 0 464.6593,723.4741 L464.6593,647.81 L454.6593,637.81 L344.27,637.81 L340.27,577.05 L336.27,637.81 L215.88,637.81 A0,0 0 0 0 215.88,637.81" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M454.6593,637.81 L454.6593,647.81 L464.6593,647.81 L454.6593,637.81" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.6216" x="221.88" y="654.8769">seat manifests are then shaped at</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.7793" x="221.88" y="670.0097">runtime: allowlist filter + overwrite</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.229" x="221.88" y="685.1425">guard under the zero-mutation-</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141.1274" x="221.88" y="700.2753">affordance invariant (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="26.9712" x="363.0074" y="700.2753">F13</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.2041" x="389.9786" y="700.2753">),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.2368" x="221.88" y="715.4081">every delta logged</text></g><!--link ROLES to VAL--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="17" id="lnk10"><path d="M942.94,84.42 C904.3,102.73 854.44,124.54 808.27,139.19 C733.26,162.99 649.5393,178.2415 592.7293,187.0415" fill="none" id="ROLES-to-VAL" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="586.8,187.96,596.3062,190.5352,591.7411,187.1946,595.0816,182.6295,586.8,187.96" style="stroke:#181818;stroke-width:1;"/></g><!--link CASTS to VAL--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="18" id="lnk11"><path d="M239.44,87.54 C317.52,116.63 417.2576,153.7852 477.3776,176.1852" fill="none" id="CASTS-to-VAL" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="483,178.28,475.9629,171.3894,478.3146,176.5343,473.1698,178.886,483,178.28" style="stroke:#181818;stroke-width:1;"/></g><!--link PROF to VAL--><g class="link" data-entity-1="ent0004" data-entity-2="ent0007" data-link-type="dependency" data-source-line="19" id="lnk12"><path d="M369.68,76.24 C409.04,105.56 467.6289,149.2149 501.8089,174.6849" fill="none" id="PROF-to-VAL" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="506.62,178.27,501.7934,169.6849,502.6107,175.2824,497.0132,176.0997,506.62,178.27" style="stroke:#181818;stroke-width:1;"/></g><!--link MATRIX to VAL--><g class="link" data-entity-1="ent0005" data-entity-2="ent0007" data-link-type="dependency" data-source-line="20" id="ln