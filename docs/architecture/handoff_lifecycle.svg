>(</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="77.7271" x="304.2583" y="190.0591">F18-family</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="62.8608" x="386.1177" y="190.0591">rationale)</text><rect fill="#F1F1F1" height="89.8438" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="215.6973" x="57.4893" y="117.9375"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7168" x="67.4893" y="139.0762">Extract FACT mechanically</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.2598" x="67.4893" y="153.0449">file map + AST signatures,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="123.0879" x="67.4893" y="167.0137">capability inventory,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="195.6973" x="67.4893" y="180.9824">verification record as COMPLETE</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="149.9238" x="67.4893" y="194.9512">re-runnable run_checks (</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="24.8965" x="217.4131" y="194.9512">F20</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="4.6816" x="242.3096" y="194.9512">)</text><path d="M288.8535,223.4688 L288.8535,254.7344 L268.8535,258.7344 L288.8535,262.7344 L288.8535,294 A0,0 0 0 0 288.8535,294 L527.0259,294 A0,0 0 0 0 527.0259,294 L527.0259,233.4688 L517.0259,223.4688 L288.8535,223.4688 A0,0 0 0 0 288.8535,223.4688" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M517.0259,223.4688 L517.0259,233.4688 L527.0259,233.4688 L517.0259,223.4688" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.1724" x="294.8535" y="240.5356">open-ended reflective asks derail</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="294.8535" y="255.6685">(</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="35.1597" x="299.9253" y="255.6685">F18&#8244;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="129.3652" x="335.085" y="255.6685">); concrete asks ran</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.5864" x="294.8535" y="270.8013">4/4 with zero reasoning-only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.5991" x="294.8535" y="285.9341">turns (run 2.5)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="207.0313" x="61.8223" y="227.7813"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="187.0313" x="71.8223" y="248.9199">PROSE via concrete micro-asks</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="168.6855" x="71.8223" y="262.8887">(3-8 lines each, anchored to</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="76.6465" x="71.8223" y="276.8574">spec/code &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="24.8965" x="152.2832" y="276.8574">F21</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="4.6816" x="177.1797" y="276.8574">)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-wi