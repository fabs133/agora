<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="800px" preserveAspectRatio="none" style="width:685px;height:800px;background:#FFFFFF;" version="1.1" viewBox="0 0 685 800" width="685px" zoomAndPan="magnify"><defs/><g><ellipse cx="242.6716" cy="20" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="230.9023" x="127.2205" y="50"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="95.6777" x="137.2205" y="71.1387">Phase gate RED</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.9023" x="137.2205" y="85.1074">(per-predicate outcomes recorded)</text><path d="M417.2693,107.9375 L417.2693,154.3359 L397.2693,158.3359 L417.2693,162.3359 L417.2693,208.7344 A0,0 0 0 0 417.2693,208.7344 L673.012,208.7344 A0,0 0 0 0 673.012,208.7344 L673.012,117.9375 L663.012,107.9375 L417.2693,107.9375 A0,0 0 0 0 417.2693,107.9375" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M663.012,107.9375 L663.012,117.9375 L673.012,117.9375 L663.012,107.9375" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.6064" x="423.2693" y="125.0044">oracle quality is bounded by what</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.9561" x="423.2693" y="140.1372">gates can NAME (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.9258" x="538.2253" y="140.1372">F7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.8066" x="556.1511" y="140.1372">) and by what</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.541" x="423.2693" y="155.27">artifacts let surface: swallowed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="162.5889" x="423.2693" y="170.4028">errors starve the oracle (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="26.9712" x="585.8582" y="170.4028">F17</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="9.4517" x="612.8293" y="170.4028">);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="234.7427" x="423.2693" y="185.5356">captures keep head+tail so pytest's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.2261" x="423.2693" y="200.6685">tail summary survives (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="26.9712" x="576.4954" y="200.6685">F11</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="603.4666" y="200.6685">)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="309.1953" x="88.074" y="127.3828"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="248.4609" x="98.074" y="148.5215">Resolve oracle: oracle_records_for_phase</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.3711" x="98.074" y="162.4902">reads tasks.jsonl, LATEST record wins</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="247.2129" x="98.074" y="176.459">(mechanical re-evals are persisted too &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="33.4863" x="349.1013" y="176.459">F17b</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="4.6816" x="382.5876" y="176.459">)</text><path d="M344.9031,223.8398 L344.9031,262.6719 L324.9031,266.6719 L344.9031,270.6719 L344.9031,309.5039 A0,0 0 0 0 344.9031,309.5039 L596.3103,309.5039 A0,0 0 0 0 596.3103,309.5039 L596.3103,233.8398 L586.3103,223.8398 L344.9031,223.8398 A0,0 0 0 0 344.9031,223.8398" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M586.3103,223.8398 L586.3103,233.8398 L596.3103,233.8398 L586.3103,223.8398" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.5991" x="350.9031" y="240.9067">repair inherits the original task's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="58.4302" x="350.9031" y="256.0396">context (</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.9258" x="409.3333" y="256.0396">F9</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119.2534" x="427.259" y="256.0396">) &#8212; so the original</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.4072" x="350.9031" y="271.1724">description must carry the contract</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="5.0718" x="350.9031" y="286.3052">(</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.9258" x="355.9749" y="286.3052">F8</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.5039" x="373.9006" y="286.3052">), and the authority clause</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.7109" x="350.9031" y="301.438">states the tests/spec are right</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="164.4629" x="160.4402" y="228.7344"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="131.0801" x="170.4402" y="249.873">Build repair prompt =</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144.4629" x="170.4402" y="263.8418">original task description</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="125.5371" x="170.4402" y="277.8105">+ AUTHORITY clause</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="116.4199" x="170.4402" y="291.7793">+ oracle VERBATIM</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="232.127" x="126.6082" y="329.5039"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" text-decoration="line-through" textLength="111.2344" x="136.6082" y="350.6426">rerun-task &lt;task&gt;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.0781" x="251.657" y="350.6426">oracle &lt;phase&gt;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="195.082" x="136.6082" y="364.6113">(cross-phase allowed: fix lives in</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="148.207" x="136.6082" y="378.5801">another phase's artifact)</text><rect fill="#F1F1F1" height="75.875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="246.1133" x="119.615" y="411.4102"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.1133" x="129.615" y="432.5488">Task executes; its OWN gate must be</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="180.9609" x="129.615" y="446.5176">able to red on its own defect (</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="24.8965" x="310.5759" y="446.5176">F10</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="4.6816" x="335.4724" y="446.5176">)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="216.9668" x="129.615" y="460.4863">&#8212; a locally-green task no-ops under</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="94.3652" x="129.615" y="474.4551">a foreign oracle</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="252.1016" x="116.6208" y="507.2852"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="232.1016" x="126.6208" y="528.4238">reevaluate_phase_gate &#8212; mechanical,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="138.1641" x="126.6208" y="542.3926">full gate re-evaluated (</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="24.8965" x="264.7849" y="542.3926">F23</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="8.4961" x="289.6814" y="542.3926">),</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.6992" x="126.6208" y="556.3613">record marked mechanical: true</text><polygon fill="#F1F1F1" points="209.5964,589.1914,275.7468,589.1914,287.7468,601.1914,275.7468,613.1914,209.5964,613.1914,197.5964,601.1914,209.5964,589.1914" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="66.1504" x="209.5964" y="604.9995">gate green?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="178.5881" y="598.5972">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.7017" x="287.7468" y="598.5972">no</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="120.8105" x="11" y="623.1914"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="100.8105" x="21" y="644.3301">continue (--next)</text><ellipse cx="71.4053" cy="703.1602" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="71.4053" cy="703.1602" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#F1F1F1" points="341.0845,623.1914,486.7915,623.1914,498.7915,642.3984,486.7915,661.6055,341.0845,661.6055,329.0845,642.3984,341.0845,623.1914" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="145.707" x="341.0845" y="633.4019">conditions defect verified?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="142.189" x="341.0845" y="646.2065">(framework bug / channel</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="134.3955" x="341.0845" y="659.0112">starvation / spec defect)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="310.0762" y="639.8042">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.7017" x="498.7915" y="639.8042">no</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="241.4375" x="161.8105" y="671.6055"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.0762" x="171.8105" y="692.7441">re-establish WITHOUT consuming</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="221.4375" x="171.8105" y="706.7129">budget (standing rule, 3 precedents)</text><ellipse cx="282.5293" cy="764.5117" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="282.5293" cy="764.5117" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="244.1973" x="423.248" y="671.6055"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="174.4395" x="433.248" y="692.7441">budget: ONE repair per gate;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.1797" x="433.248" y="706.7129">second red on the same gate</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="224.1973" x="433.248" y="720.6816">STOPS THE RUN &#8212; waivers forbidden</text><ellipse cx="545.3467" cy="778.4805" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="545.3467" cy="778.4805" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="242.6716" x2="242.6716" y1="30" y2="50"/><polygon fill="#181818" points="238.6716,40,242.6716,50,246.6716,40,242.6716,44" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="242.6716" x2="242.6716" y1="97.9375" y2="127.3828"/><polygon fill="#181818" points="238.6716,117.3828,242.6716,127.3828,246.6716,117.3828,242.6716,121.3828" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="242.6716" x2="